<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>

    <!-- Shield outer glow -->
    <linearGradient id="shieldOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0077ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0.6" />
    </linearGradient>

    <!-- Shield fill -->
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#061428;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1e38;stop-opacity:1" />
    </linearGradient>

    <!-- Neon cyan glow filter -->
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Strong glow for accent lines -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Inner icon glow -->
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle text glow -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip path for shield interior -->
    <clipPath id="shieldClip">
      <path d="M100,42 L155,28 L210,42 L210,110 Q210,155 155,178 Q100,155 100,110 Z"/>
    </clipPath>

    <!-- Accent gradient for scan line -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#00e5ff;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#00e5ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0" />
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#e8f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:1" />
    </linearGradient>

    <!-- Tagline gradient -->
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0077ff;stop-opacity:0.7" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="600" height="220" rx="12" ry="12" fill="url(#bgGrad)"/>

  <!-- Grid pattern overlay (subtle tech feel) -->
  <g opacity="0.04" stroke="#00e5ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="220"/>
    <line x1="120" y1="0" x2="120" y2="220"/>
    <line x1="180" y1="0" x2="180" y2="220"/>
    <line x1="240" y1="0" x2="240" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="360" y1="0" x2="360" y2="220"/>
    <line x1="420" y1="0" x2="420" y2="220"/>
    <line x1="480" y1="0" x2="480" y2="220"/>
    <line x1="540" y1="0" x2="540" y2="220"/>
  </g>

  <!-- ===== SHIELD ===== -->

  <!-- Shield shadow/halo -->
  <path d="M100,42 L155,28 L210,42 L210,110 Q210,155 155,178 Q100,155 100,110 Z"
        fill="none" stroke="#00e5ff" stroke-width="10" opacity="0.06" filter="url(#strongGlow)"/>

  <!-- Shield body fill -->
  <path d="M100,42 L155,28 L210,42 L210,110 Q210,155 155,178 Q100,155 100,110 Z"
        fill="url(#shieldFill)"/>

  <!-- Shield border with glow -->
  <path d="M100,42 L155,28 L210,42 L210,110 Q210,155 155,178 Q100,155 100,110 Z"
        fill="none" stroke="url(#shieldOuter)" stroke-width="2.2" filter="url(#cyanGlow)"/>

  <!-- Shield inner bevel (top-left highlight) -->
  <path d="M105,46 L155,33 L205,46 L205,110 Q205,150 155,172"
        fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.4"/>

  <!-- Shield geometric corner cuts (sharp tech detail) -->
  <polygon points="100,42 115,42 100,57" fill="#00e5ff" opacity="0.7"/>
  <polygon points="210,42 195,42 210,57" fill="#00e5ff" opacity="0.7"/>

  <!-- Scan line across shield -->
  <rect x="100" y="104" width="110" height="1.5" fill="url(#scanGrad)" opacity="0.7"/>

  <!-- ===== CENTRAL ICON - circuit-node eye / monitor symbol ===== -->
  <!-- Outer ring -->
  <circle cx="155" cy="103" r="28" fill="none" stroke="#00e5ff" stroke-width="1.4"
          stroke-dasharray="6 3" opacity="0.5" filter="url(#iconGlow)"/>

  <!-- Middle ring -->
  <circle cx="155" cy="103" r="20" fill="none" stroke="#00e5ff" stroke-width="1.6"
          opacity="0.8" filter="url(#iconGlow)"/>

  <!-- Core -->
  <circle cx="155" cy="103" r="11" fill="#0a2244" stroke="#00e5ff" stroke-width="1.8"
          filter="url(#iconGlow)"/>

  <!-- Iris glow fill -->
  <circle cx="155" cy="103" r="7" fill="#00c8ff" opacity="0.3"/>
  <circle cx="155" cy="103" r="4" fill="#00e5ff" opacity="0.85" filter="url(#iconGlow)"/>

  <!-- Crosshair ticks -->
  <line x1="155" y1="75" x2="155" y2="82" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="155" y1="124" x2="155" y2="131" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="127" y1="103" x2="134" y2="103" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="176" y1="103" x2="183" y2="103" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>

  <!-- Diagonal accent nodes -->
  <circle cx="135" cy="83" r="2" fill="#00e5ff" opacity="0.6"/>
  <circle cx="175" cy="83" r="2" fill="#00e5ff" opacity="0.6"/>
  <circle cx="135" cy="123" r="2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="175" cy="123" r="2" fill="#00e5ff" opacity="0.5"/>

  <!-- Circuit traces from core outward -->
  <line x1="135" y1="83" x2="140" y2="88" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="175" y1="83" x2="170" y2="88" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="135" y1="123" x2="140" y2="118" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="175" y1="123" x2="170" y2="118" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== TYPOGRAPHY ===== -->

  <!-- "SecGuard" wordmark -->
  <text x="240" y="108"
        font-family="'Orbitron', 'Rajdhani', 'Exo 2', 'Courier New', monospace"
        font-size="52"
        font-weight="800"
        letter-spacing="3"
        fill="url(#textGrad)"
        filter="url(#textGlow)">SecGuard</text>

  <!-- Tagline -->
  <text x="242" y="134"
        font-family="'Rajdhani', 'Exo 2', 'Courier New', monospace"
        font-size="13"
        font-weight="500"
        letter-spacing="5.5"
        fill="url(#tagGrad)"
        opacity="0.9">DEVICE INTELLIGENCE &amp; FRAUD PROTECTION</text>

  <!-- Accent separator line below tagline -->
  <line x1="242" y1="144" x2="555" y2="144" stroke="#00e5ff" stroke-width="0.8" opacity="0.3"/>

  <!-- Top-right corner bracket decoration -->
  <polyline points="568,18 580,18 580,30" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom-left corner bracket decoration -->
  <polyline points="18,202 18,190 30,190" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Status dot -->
  <circle cx="246" cy="154" r="3.5" fill="#00ff88" opacity="0.9" filter="url(#iconGlow)"/>
  <text x="256" y="158"
        font-family="monospace"
        font-size="9"
        letter-spacing="3"
        fill="#00ff88"
        opacity="0.75">SYSTEM ACTIVE</text>

  <!-- Version badge -->
  <rect x="508" y="148" width="46" height="16" rx="3" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-width="0.6" stroke-opacity="0.3"/>
  <text x="513" y="160"
        font-family="monospace"
        font-size="8.5"
        letter-spacing="1.5"
        fill="#00e5ff"
        opacity="0.55">v2.0.1</text>
</svg>
