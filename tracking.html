<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secguard | Live Tracking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/platform.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/data-service.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body data-page="tracking">
  <div class="page-shell">
    <aside class="sidebar" data-platform-nav></aside>

    <section class="main-shell">
      <div class="page-header">
        <div>
          <small class="notification-pill" id="tracking-offroute-pill"><strong>0</strong> devices off-route</small>
          <h2>Live tracking matrix</h2>
          <p>Track device movement, last online status, and signal health for devices in field deployment.</p>
        </div>
        <button class="btn">Refresh feed</button>
      </div>

      <div class="card-grid large-grid">
        <article class="card map-card">
          <div id="tracking-map" aria-label="Live device tracking map"></div>
          <p id="tracking-map-summary">Live telemetry map initializing.</p>
        </article>

        <article class="card">
          <div class="top-bar">
            <div>
              <small>Position feed</small>
              <strong>Live device cards</strong>
            </div>
          </div>
          <div class="device-list">
            <!-- Live device cards inserted here -->
          </div>
        </article>
      </div>

      <div class="card-grid kpi-grid" style="margin-top: 22px;" id="tracking-kpi-grid">
        <!-- Live tracking KPIs will be inserted here -->
      </div>

      <div class="card-grid large-grid" style="margin-top: 22px;">
        <article class="card">
          <div class="top-bar">
            <div>
              <small>Route overview</small>
              <strong>Live tracking table</strong>
            </div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Device</th>
                  <th>Last seen</th>
                  <th>Route status</th>
                  <th>Signal</th>
                  <th>ERP sync</th>
                </tr>
              </thead>
              <tbody id="tracking-table-body">
                <!-- Tracking rows inserted here -->
              </tbody>
            </table>
          </div>
        </article>
      </div>
    </section>
  </div>
  <script src="js/platform-nav.js"></script>
  <script src="js/platform.js"></script>
</body>
</html>
